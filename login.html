<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Havën">
  <script>if (location.protocol !== 'file:') document.write('<link rel="manifest" href="manifest.json">');</script>
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Havën</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }

    .login-wrap {
      width: 340px;
      padding: 0 20px;
      animation: fadeIn 0.4s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Brand ─── */
    .login-brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--primary);
      color: var(--on-primary);
      margin-bottom: 12px;
      opacity: 0.85;
    }
    .login-brand-mark svg {
      width: 18px;
      height: 18px;
    }
    .login-brand-name {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .login-brand-tagline {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      margin-top: 2px;
      font-weight: 400;
      opacity: 0.6;
    }

    /* ─── Name input ─── */
    .login-field {
      position: relative;
    }
    .login-input {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 500;
      outline: none;
      transition: background 0.2s, box-shadow 0.2s;
      line-height: 1.5;
    }
    .login-input::placeholder {
      color: var(--text-tertiary);
      font-weight: 400;
      opacity: 0.45;
    }
    .login-input:focus {
      background: var(--bg-card);
      box-shadow: 0 0 0 1px var(--border-color);
    }

    /* ─── Continue button ─── */
    .login-continue {
      width: 100%;
      margin-top: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: var(--text-primary);
      color: var(--bg-primary);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      line-height: 1.5;
    }
    .login-continue:hover {
      opacity: 0.8;
    }
    .login-continue:disabled {
      opacity: 0.25;
      cursor: default;
    }
    .login-continue:disabled:hover {
      opacity: 0.25;
    }

    /* ─── Skip link ─── */
    .login-skip {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 0.78rem;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: color 0.15s;
      opacity: 0.5;
    }
    .login-skip:hover {
      opacity: 1;
      color: var(--text-secondary);
    }

    /* ─── Separator ─── */
    .login-sep {
      display: flex;
      align-items: center;
      margin: 28px 0;
    }
    .login-sep::before,
    .login-sep::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
      opacity: 0.4;
    }
    .login-sep span {
      padding: 0 16px;
      font-size: 0.65rem;
      color: var(--text-tertiary);
      font-weight: 500;
      opacity: 0.4;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    /* ─── Google button ─── */
    .login-google {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 11px 16px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
      line-height: 1.5;
    }
    .login-google:hover {
      background: var(--accent-soft);
      border-color: var(--border-color);
      color: var(--text-primary);
    }
    .login-google svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ─── Footer links ─── */
    .login-footer {
      text-align: center;
      margin-top: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .login-footer a {
      font-size: 0.68rem;
      color: var(--text-tertiary);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
      opacity: 0.4;
    }
    .login-footer a:hover {
      opacity: 1;
      color: var(--text-secondary);
    }

    @media (max-width: 440px) {
      .login-wrap { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.5 8c0-1.4 0-2.1.44-2.65C5.08 5 5.73 4.9 7 4.7l10-.4c1.28-.2 1.92-.3 2.36.25.44.54.44 1.24.44 2.65v.3c0 .9 0 1.35-.2 1.7-.1.18-.24.33-.4.44-.33.26-.77.26-1.66.26H6.46c-.89 0-1.33 0-1.66-.26a1.5 1.5 0 01-.4-.44c-.2-.35-.2-.8-.2-1.7V8z"/>
          <path d="M5 10l1.6 7.5c.22 1 .33 1.5.7 1.88.38.37.9.52 1.93.62h5.54c1.04-.1 1.55-.25 1.93-.62.37-.38.48-.87.7-1.87L19 10"/>
        </svg>
      </div>
      <div class="login-brand-name">Havën</div>
      <div class="login-brand-tagline">Your schedule, synced</div>
    </div>

    <div class="login-field">
      <input class="login-input" id="loginNameInput" type="text" placeholder="Your name" autocomplete="name" spellcheck="false" maxlength="30">
    </div>

    <button class="login-continue" id="loginNameBtn" disabled>Continue</button>

    <span class="login-skip" id="loginSkip">Continue with guest account</span>

    <div class="login-sep"><span>or</span></div>

    <button class="login-google" id="loginGoogleBtn">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/>
        <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.95 1 11.02 1 13s.43 4.05 1.18 5.93l2.66-2.84z"/>
        <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="login-footer">
      <a id="loginPolicy">Privacy</a>
      <a id="loginTerms">Terms</a>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="settings.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-firestore-compat.js"></script>
  <script src="firestore.js"></script>
  <script src="gsi.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    }
  </script>
  <script>
    (function() {
      document.addEventListener('DOMContentLoaded', function() {
        initGSI();

        var googleBtn = document.getElementById('loginGoogleBtn');
        var input = document.getElementById('loginNameInput');
        var nameBtn = document.getElementById('loginNameBtn');
        var skip = document.getElementById('loginSkip');

        googleBtn.addEventListener('click', firebaseSignIn);

        function updateBtn() {
          nameBtn.disabled = !input.value.trim();
        }
        updateBtn();
        input.addEventListener('input', updateBtn);

        input.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && input.value.trim()) goLocal();
        });
        nameBtn.addEventListener('click', goLocal);

        skip.addEventListener('click', function(e) {
          e.preventDefault();
          sessionStorage.setItem('haven-guest', '1');
          location.href = 'index.html';
        });

        document.getElementById('loginPolicy').addEventListener('click', function(e) {
          e.preventDefault();
          window.open('https://codebuff.com/privacy', '_blank');
        });
        document.getElementById('loginTerms').addEventListener('click', function(e) {
          e.preventDefault();
          window.open('https://codebuff.com/terms', '_blank');
        });

        function goLocal() {
          var name = input.value.trim();
          if (!name) return;
          nameBtn.disabled = true;
          nameBtn.textContent = '…';
          createLocalProfile(name);
        }
      });
    })();
  </script>
</body>
</html>
