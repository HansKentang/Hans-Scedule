<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0b">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Havën">
  <script>if (location.protocol !== 'file:') document.write('<link rel="manifest" href="manifest.json">');</script>
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Havën</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }

    .login-wrap {
      width: 340px;
      padding: 0 20px;
      animation: fadeIn 0.4s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Brand ─── */
    .login-brand {
      text-align: center;
      margin-bottom: 40px;
    }
    .login-brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      background: var(--primary);
      color: var(--on-primary);
      margin-bottom: 12px;
      opacity: 0.85;
    }
    .login-brand-mark svg {
      width: 18px;
      height: 18px;
    }
    .login-brand-name {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .login-brand-tagline {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      margin-top: 2px;
      font-weight: 400;
      opacity: 0.6;
    }

    /* ─── Name input ─── */
    .login-field {
      position: relative;
    }
    .login-input {
      width: 100%;
      padding: 14px 16px;
      border: none;
      border-radius: 10px;
      background: var(--bg-secondary);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.92rem;
      font-weight: 500;
      outline: none;
      transition: background 0.2s, box-shadow 0.2s;
      line-height: 1.5;
    }
    .login-input::placeholder {
      color: var(--text-tertiary);
      font-weight: 400;
      opacity: 0.45;
    }
    .login-input:focus {
      background: var(--bg-card);
      box-shadow: 0 0 0 1px var(--border-color);
    }

    /* ─── Continue button ─── */
    .login-continue {
      width: 100%;
      margin-top: 8px;
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: var(--text-primary);
      color: var(--bg-primary);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
      line-height: 1.5;
    }
    .login-continue:hover {
      opacity: 0.8;
    }
    .login-continue:disabled {
      opacity: 0.25;
      cursor: default;
    }
    .login-continue:disabled:hover {
      opacity: 0.25;
    }

    /* ─── Skip link ─── */
    .login-skip {
      display: block;
      text-align: center;
      margin-top: 14px;
      font-size: 0.78rem;
      color: var(--text-tertiary);
      cursor: pointer;
      transition: color 0.15s;
      opacity: 0.5;
    }
    .login-skip:hover {
      opacity: 1;
      color: var(--text-secondary);
    }

    /* ─── Footer links ─── */
    .login-footer {
      text-align: center;
      margin-top: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }
    .login-footer a {
      font-size: 0.68rem;
      color: var(--text-tertiary);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
      opacity: 0.4;
    }
    .login-footer a:hover {
      opacity: 1;
      color: var(--text-secondary);
    }

    @media (max-width: 440px) {
      .login-wrap { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="login-brand-mark">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="3" ry="3"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
          <circle cx="12" cy="16" r="2" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <div class="login-brand-name">Havën</div>
      <div class="login-brand-tagline">Your schedule, synced</div>
    </div>

    <div class="login-field">
      <input class="login-input" id="loginNameInput" type="text" placeholder="Your name" autocomplete="name" spellcheck="false" maxlength="30">
    </div>

    <button class="login-continue" id="loginNameBtn" disabled>Continue</button>

    <span class="login-skip" id="loginSkip">Continue with guest account</span>

    <div class="login-footer">
      <a id="loginPolicy">Privacy</a>
      <a id="loginTerms">Terms</a>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="settings.js"></script>
  <script src="gsi.js"></script>
  <script>
    (function() {
      document.addEventListener('DOMContentLoaded', function() {
        initGSI();

        var input = document.getElementById('loginNameInput');
        var nameBtn = document.getElementById('loginNameBtn');
        var skip = document.getElementById('loginSkip');

        function updateBtn() {
          nameBtn.disabled = !input.value.trim();
        }
        updateBtn();
        input.addEventListener('input', updateBtn);

        input.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && input.value.trim()) goLocal();
        });
        nameBtn.addEventListener('click', goLocal);

        skip.addEventListener('click', function(e) {
          e.preventDefault();
          sessionStorage.setItem('haven-guest', '1');
          location.href = 'index.html';
        });

        document.getElementById('loginPolicy').addEventListener('click', function(e) {
          e.preventDefault();
          window.open('https://codebuff.com/privacy', '_blank');
        });
        document.getElementById('loginTerms').addEventListener('click', function(e) {
          e.preventDefault();
          window.open('https://codebuff.com/terms', '_blank');
        });

        function goLocal() {
          var name = input.value.trim();
          if (!name) return;
          nameBtn.disabled = true;
          nameBtn.textContent = '…';
          createLocalProfile(name);
        }
      });
    })();
  </script>
</body>
</html>
