<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Havën — Log In</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Hanken Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      line-height: 1.5;
    }

    .login-container {
      width: 360px;
      padding: 0 16px;
      animation: fadeIn 0.2s ease both;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* ─── Logo ─── */
    .login-logo-wrap {
      text-align: center;
      margin-bottom: 24px;
    }
    .login-logo {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 6px;
      background: var(--primary);
      color: var(--on-primary);
    }
    .login-logo svg {
      width: 16px;
      height: 16px;
    }

    /* ─── Heading ─── */
    .login-heading {
      text-align: center;
      margin-bottom: 28px;
    }
    .login-heading h1 {
      font-size: 1.35rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      color: var(--text-primary);
      line-height: 1.3;
    }
    .login-heading p {
      font-size: 0.85rem;
      color: var(--text-tertiary);
      margin-top: 4px;
      font-weight: 400;
    }

    /* ─── Input ─── */
    .login-field {
      margin-bottom: 12px;
    }
    .login-field label {
      display: block;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 6px;
    }
    .login-input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s;
      line-height: 1.5;
    }
    .login-input::placeholder {
      color: var(--text-tertiary);
      opacity: 0.55;
    }
    .login-input:focus {
      border-color: var(--primary);
    }

    /* ─── Primary Button ─── */
    .login-btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      background: var(--text-primary);
      color: var(--bg-primary);
      font-family: inherit;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
      line-height: 1.5;
    }
    .login-btn:hover {
      opacity: 0.8;
    }
    .login-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }
    .login-btn:disabled:hover {
      opacity: 0.3;
    }

    /* ─── SSO Divider ─── */
    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 16px 0;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border-color);
    }
    .login-divider span {
      font-size: 0.7rem;
      color: var(--text-tertiary);
      white-space: nowrap;
      font-weight: 400;
    }

    /* ─── SSO Buttons (Notion style) ─── */
    .login-sso-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 9px 16px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      line-height: 1.5;
      text-decoration: none;
    }
    .login-sso-btn:hover {
      background: var(--accent-soft);
      border-color: var(--border-color);
      color: var(--text-primary);
    }
    .login-sso-btn + .login-sso-btn {
      margin-top: 8px;
    }
    .login-sso-btn svg {
      flex-shrink: 0;
    }

    /* ─── Links ─── */
    .login-footer-links {
      text-align: center;
      margin-top: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .login-footer-links a {
      font-size: 0.78rem;
      color: var(--text-tertiary);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .login-footer-links a:hover {
      color: var(--text-secondary);
    }

    .login-signup {
      text-align: center;
      margin-top: 16px;
    }
    .login-signup a {
      font-size: 0.82rem;
      color: var(--text-tertiary);
      text-decoration: none;
      cursor: pointer;
      transition: color 0.15s;
    }
    .login-signup a:hover {
      color: var(--text-secondary);
    }

    @media (max-width: 440px) {
      .login-container { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-logo-wrap">
      <div class="login-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4.5 8c0-1.4 0-2.1.44-2.65C5.08 5 5.73 4.9 7 4.7l10-.4c1.28-.2 1.92-.3 2.36.25.44.54.44 1.24.44 2.65v.3c0 .9 0 1.35-.2 1.7-.1.18-.24.33-.4.44-.33.26-.77.26-1.66.26H6.46c-.89 0-1.33 0-1.66-.26a1.5 1.5 0 01-.4-.44c-.2-.35-.2-.8-.2-1.7V8z"/>
          <path d="M5 10l1.6 7.5c.22 1 .33 1.5.7 1.88.38.37.9.52 1.93.62h5.54c1.04-.1 1.55-.25 1.93-.62.37-.38.48-.87.7-1.87L19 10"/>
        </svg>
      </div>
    </div>

    <div class="login-heading">
      <h1>Log in</h1>
      <p>to continue to Havën</p>
    </div>

    <div class="login-field">
      <label>Name</label>
      <input class="login-input" id="loginNameInput" type="text" placeholder="Enter your name" autocomplete="name" spellcheck="false" maxlength="30">
    </div>

    <button class="login-btn" id="loginNameBtn" disabled>Continue</button>

    <div class="login-signup">
      <a id="loginSkip">Continue without signing in</a>
    </div>

    <div class="login-divider"><span>or</span></div>

    <button class="login-sso-btn" id="loginGoogleBtn">
      <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.95 1 11.02 1 13s.43 4.05 1.18 5.93l2.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="login-footer-links">
      <a id="loginPolicy">Privacy</a>
      <a id="loginTerms">Terms</a>
    </div>
  </div>

  <script src="shared.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.10.0/firebase-auth-compat.js"></script>
  <script src="gsi.js"></script>
  <script>
    (function() {
      document.addEventListener('DOMContentLoaded', function() {
        initGSI();

        var googleBtn = document.getElementById('loginGoogleBtn');
        var input = document.getElementById('loginNameInput');
        var nameBtn = document.getElementById('loginNameBtn');
        var skip = document.getElementById('loginSkip');

        googleBtn.addEventListener('click', firebaseSignIn);

        function updateBtn() {
          nameBtn.disabled = !input.value.trim();
        }
        updateBtn();
        input.addEventListener('input', updateBtn);

        input.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && input.value.trim()) goLocal();
        });
        nameBtn.addEventListener('click', goLocal);

        skip.addEventListener('click', function(e) {
          e.preventDefault();
          sessionStorage.setItem('haven-guest', '1');
          location.href = 'index.html';
        });

        document.getElementById('loginPolicy').addEventListener('click', function(e) {
          e.preventDefault();
          window.open('https://codebuff.com/privacy', '_blank');
        });
        document.getElementById('loginTerms').addEventListener('click', function(e) {
          e.preventDefault();
          window.open('https://codebuff.com/terms', '_blank');
        });

        function goLocal() {
          var name = input.value.trim();
          if (!name) return;
          nameBtn.disabled = true;
          nameBtn.textContent = '…';
          createLocalProfile(name);
        }
      });
    })();
  </script>
</body>
</html>
