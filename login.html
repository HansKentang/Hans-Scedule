<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Havën — Sign In</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      border-radius: 20px;
      padding: 48px 40px 36px;
      width: 340px;
      text-align: center;
      box-shadow: var(--shadow-lg);
    }
    .login-avatar {
      width: 68px; height: 68px;
      border-radius: 50%;
      margin: 0 auto 20px;
      border: 2px solid color-mix(in srgb, var(--primary) 40%, transparent);
      box-shadow: 0 0 30px color-mix(in srgb, var(--primary) 10%, transparent);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .login-avatar svg {
      width: 38px; height: 38px;
      color: var(--primary);
      opacity: 0.7;
    }
    .login-title {
      font-family: 'EB Garamond', serif;
      font-size: 1.6rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      margin-bottom: 4px;
      color: var(--text-primary);
    }
    .login-tagline {
      font-size: 0.85rem;
      color: var(--text-tertiary);
      margin-bottom: 28px;
      line-height: 1.5;
    }
    .login-btn-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 4px;
      min-height: 44px;
    }
    .login-btn-wrap iframe { border-radius: 24px !important; }
    .login-skip {
      display: inline-block;
      margin-top: 20px;
      font-size: 0.78rem;
      color: var(--text-tertiary);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: color 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .login-skip:hover {
      color: var(--text-secondary);
      border-color: var(--border-color);
    }
    .login-footer {
      margin-top: 32px;
      font-size: 0.68rem;
      color: var(--text-tertiary);
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-avatar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 7a2 2 0 012-2h12a2 2 0 012 2v10a2 2 0 01-2 2H6a2 2 0 01-2-2V7z"/>
        <path d="M8 5V3h8v2"/>
        <circle cx="9" cy="12" r="1" fill="currentColor"/>
        <circle cx="15" cy="12" r="1" fill="currentColor"/>
        <path d="M8 16a3.5 3.5 0 018 0"/>
      </svg>
    </div>
    <div class="login-title">Havën</div>
    <div class="login-tagline">Your mindful schedule</div>
    <div class="login-btn-wrap" id="gsiButtonContainer"></div>
    <div>
      <a class="login-skip" id="loginSkip">Continue without signing in</a>
    </div>
    <div class="login-footer">Havën Schedule</div>
  </div>
  <script src="shared.js"></script>
  <script src="gsi.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      initGSI();
      document.getElementById('loginSkip').addEventListener('click', function(e) {
        e.preventDefault();
        sessionStorage.setItem('haven-guest', '1');
        location.href = 'index.html';
      });
    });
  </script>
</body>
</html>
