<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Havën">
  <meta name="description" content="Havën Schedule — Your personal smart scheduler.">
  <script>if (location.protocol !== 'file:') document.write('<link rel="manifest" href="manifest.json">');</script>
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Havën</title>
  <link rel="icon" href="icon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #000;
      --bg-elevated: #0a0a0a;
      --border: rgba(255,255,255,0.08);
      --border-light: rgba(255,255,255,0.12);
      --text: #fff;
      --text-secondary: rgba(255,255,255,0.7);
      --text-tertiary: rgba(255,255,255,0.38);
      --glass-bg: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.10);
      --font-sans: 'Hanken Grotesk', system-ui, -apple-system, sans-serif;
      --font-mono: 'Space Grotesk', monospace;
      --bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --smooth: cubic-bezier(0.16, 1, 0.3, 1);
    }

    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Main Grid ─── */
    .auth-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: 100%; height: 100vh;
    }

    /* ─── Left Panel ─── */
    .auth-left {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(16px, 3vh, 40px) clamp(16px, 4vw, 48px);
      position: relative;
      overflow-y: auto;
      overscroll-behavior: contain;
      animation: fadeIn 0.6s var(--bounce) both;
    }
    .auth-left::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 70% 50% at 30% 20%, rgba(255,255,255,0.025) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 70% 80%, rgba(255,255,255,0.015) 0%, transparent 50%);
      pointer-events: none;
    }
    .auth-left::after {
      content: ''; position: absolute; right: 0; top: 8%; bottom: 8%;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--border), transparent);
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Form Container ─── */
    .auth-form-wrap {
      width: min(420px, 100%);
      display: flex;
      flex-direction: column;
      gap: clamp(4px, 1vh, 8px);
      position: relative;
      z-index: 1;
    }

    /* ─── Brand ─── */
    .auth-brand {
      display: flex; align-items: center; gap: clamp(8px, 1.2vw, 14px);
      margin-bottom: clamp(4px, 0.8vh, 10px);
    }
    .auth-brand-icon {
      width: clamp(28px, 4vh, 38px); height: clamp(28px, 4vh, 38px);
      border-radius: clamp(7px, 1vh, 10px);
      background: var(--text); color: var(--bg);
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(0.82rem, 1.2vw, 1.05rem);
      font-weight: 700;
      flex-shrink: 0;
      transition: transform 0.3s var(--bounce);
    }
    .auth-brand:hover .auth-brand-icon { transform: scale(1.1) rotate(-4deg); }
    .auth-brand-text { display: flex; flex-direction: column; gap: 2px; }
    .auth-brand-name {
      font-size: clamp(0.9rem, 1.3vw, 1.1rem);
      font-weight: 600; letter-spacing: -0.02em; line-height: 1.2;
    }
    .auth-brand-tagline {
      font-size: clamp(0.6rem, 0.8vw, 0.7rem);
      color: var(--text-tertiary); font-weight: 400;
    }

    /* ─── Heading ─── */
    .auth-heading {
      font-size: clamp(1.25rem, 2.5vw, 1.75rem);
      font-weight: 600; line-height: 1.15;
      letter-spacing: -0.028em;
      margin-top: clamp(16px, 3vh, 30px);
    }
    .auth-heading .hl-accent {
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.55) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .auth-sub {
      font-size: clamp(0.78rem, 1.1vw, 0.9rem);
      color: var(--text-tertiary);
      font-weight: 400;
      line-height: 1.5;
      margin-bottom: clamp(4px, 0.8vh, 8px);
    }

    /* ─── Form inputs area ─── */
    .auth-fields {
      display: flex; flex-direction: column; gap: clamp(8px, 1.2vh, 14px);
      margin-top: clamp(14px, 2.5vh, 28px);
    }

    /* ─── Label + Input ─── */
    .auth-input-group {
      display: flex; flex-direction: column; gap: 6px;
    }
    .auth-label {
      font-size: clamp(0.75rem, 1vw, 0.85rem);
      font-weight: 500;
      color: var(--text-secondary);
      letter-spacing: 0.01em;
    }
    .auth-input {
      width: 100%;
      padding: clamp(11px, 1.8vh, 15px) clamp(12px, 2.5vw, 18px);
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(255,255,255,0.03);
      color: var(--text);
      font-family: inherit;
      font-size: clamp(0.85rem, 1.2vw, 0.98rem);
      font-weight: 500;
      outline: none;
      transition: all 0.25s var(--smooth);
    }
    .auth-input::placeholder {
      color: var(--text-tertiary);
      font-weight: 400;
      opacity: 0.4;
    }
    .auth-input:focus {
      border-color: var(--border-light);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
    }
    .auth-input:hover { border-color: var(--border-light); }

    /* ─── Submit Button ─── */
    .auth-submit {
      width: 100%;
      padding: clamp(11px, 2vh, 16px) clamp(14px, 3vw, 24px);
      border: none;
      border-radius: 10px;
      background: var(--text);
      color: var(--bg);
      font-family: inherit;
      font-size: clamp(0.82rem, 1.2vw, 0.95rem);
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s var(--bounce);
      margin-top: clamp(2px, 0.5vh, 6px);
    }
    .auth-submit:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(255,255,255,0.12);
    }
    .auth-submit:active:not(:disabled) { transform: scale(0.97); }
    .auth-submit:disabled {
      opacity: 0.2;
      cursor: default;
    }

    /* ─── Divider ─── */
    .auth-divider {
      position: relative;
      text-align: center;
      margin: clamp(4px, 0.6vh, 8px) 0 clamp(2px, 0.3vh, 4px);
    }
    .auth-divider::after {
      content: ''; position: absolute; inset: 0; top: 50%;
      z-index: 0;
      border-top: 1px solid var(--border);
    }
    .auth-divider span {
      position: relative; z-index: 1;
      background: var(--bg);
      padding: 0 12px;
      font-size: 0.72rem;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ─── Google Button ─── */
    .auth-google-btn {
      display: flex; align-items: center; justify-content: center; gap: clamp(6px, 1vw, 10px);
      width: 100%; padding: clamp(10px, 1.5vh, 14px) clamp(12px, 2.5vw, 18px);
      border-radius: 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: clamp(0.8rem, 1.1vw, 0.9rem);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s var(--bounce);
    }
    .auth-google-btn:hover {
      border-color: var(--border-light);
      color: var(--text);
      background: rgba(255,255,255,0.04);
      transform: translateY(-1px);
    }
    .auth-google-btn:active { transform: scale(0.97); }
    .auth-google-btn img, .auth-google-btn svg { width: 18px; height: 18px; }

    #googleButtonContainer {
      width: 100%; display: flex; justify-content: center;
      min-height: 36px;
    }
    #googleButtonContainer iframe { max-width: 100% !important; }

    /* ─── Toggle Link ─── */
    .auth-toggle {
      text-align: center;
      font-size: clamp(0.75rem, 1vw, 0.85rem);
      color: var(--text-tertiary);
      margin-top: clamp(4px, 0.8vh, 10px);
    }
    .auth-toggle button {
      background: none; border: none;
      color: var(--text-secondary);
      font-family: inherit;
      font-size: clamp(0.75rem, 1vw, 0.85rem);
      font-weight: 500;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.2s;
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .auth-toggle button:hover {
      color: var(--text);
    }

    /* ─── Right Panel ─── */
    .auth-right {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fff;
      animation: fadeIn 0.6s var(--bounce) both 0.1s;
    }
    .auth-right::before {
      content: ''; position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 50% 50%, rgba(0,0,0,0.025) 0%, transparent 60%),
        radial-gradient(ellipse 30% 20% at 80% 20%, rgba(0,0,0,0.015) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ─── Carousel ─── */
    .auth-carousel {
      position: relative;
      z-index: 1;
      width: 90%;
      max-width: 520px;
      background: rgba(0,0,0,0.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(0,0,0,0.10);
      border-radius: 16px;
      padding: 14px 14px 10px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.05);
      perspective: 1000px;
    }
    .auth-carousel-track {
      display: flex;
      transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1);
      will-change: transform;
      transform-style: preserve-3d;
    }
    .auth-carousel-slide {
      flex: 0 0 100%;
      min-width: 0;
      transition: transform 0.8s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.6s ease;
    }
    .auth-carousel-slide svg {
      width: 100%; height: auto;
      display: block;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .auth-carousel-slide.active-slide {
      transform: scale(1) translateZ(0);
      opacity: 1;
    }
    .auth-carousel-slide.inactive-slide {
      transform: scale(0.92) translateZ(-30px) rotateY(-2deg);
      opacity: 0.4;
    }


    /* --- Carousel Label Strip --- */
    .auth-carousel-label {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2px 8px;
      border-bottom: 1px solid rgba(0,0,0,0.04);
      margin-bottom: 8px;
    }
    .auth-carousel-label-name {
      font-size: 0.6rem;
      font-weight: 600;
      color: rgba(0,0,0,0.35);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .auth-carousel-label-name span {
      color: rgba(0,0,0,0.15);
      font-weight: 400;
    }
    .auth-carousel-label-index {
      font-size: 0.55rem;
      color: rgba(0,0,0,0.12);
      font-family: var(--font-mono);
    }
    /* Carousel dots */
    .auth-carousel-dots {
      position: absolute;
      bottom: 72px;
      left: 0; right: 0;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      pointer-events: none;
    }
    .auth-carousel-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: rgba(0,0,0,0.15);
      border: none;
      cursor: pointer;
      padding: 0;
      transition: all 0.3s var(--bounce);
      pointer-events: auto;
    }
    .auth-carousel-dot.active {
      width: 20px;
      border-radius: 3px;
      background: rgba(0,0,0,0.6);
    }
    .auth-carousel-dot:hover {
      background: rgba(0,0,0,0.3);
    }

    /* Gradient overlay + quote at bottom */
    .auth-right-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      padding: 48px 32px 24px;
      background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.5) 100%);
      text-align: center;
    }
    .auth-quote {
      font-size: 0.9rem;
      font-weight: 400;
      color: rgba(0,0,0,0.5);
      line-height: 1.5;
      max-width: 380px;
      margin: 0 auto;
    }
    .auth-quote-cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: rgba(0,0,0,0.3);
      margin-left: 2px;
      animation: blink 1s step-end infinite;
      vertical-align: text-bottom;
    }
    .auth-quote-cursor.done {
      animation: none;
      opacity: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .auth-quote-author {
      font-size: 0.7rem;
      color: rgba(0,0,0,0.25);
      margin-top: 6px;
      font-style: normal;
      font-weight: 400;
    }

    /* ─── Google Setup Dialog ─── */

    /* --- Floating Badges --- */
    .auth-float-badge {
      position: absolute;
      z-index: 5;
      background: rgba(0,0,0,0.04);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 8px;
      padding: 4px 8px;
      display: flex;
      align-items: center;
      gap: 4px;
      pointer-events: none;
      opacity: 0;
      animation: badgeAppear 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards,
                 badgeDrift 6s ease-in-out infinite 1s;
    }
    @keyframes badgeAppear {
      0% { opacity: 0; transform: translateY(8px) scale(0.95); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes badgeDrift {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-4px); }
    }
    .auth-float-badge svg {
      width: 10px; height: 10px;
      color: rgba(0,0,0,0.35);
    }
    .auth-float-badge span {
      font-size: 0.5rem;
      color: rgba(0,0,0,0.35);
      font-weight: 500;
      letter-spacing: 0.03em;
    }
    .auth-float-badge-1 {
      top: 10%; right: 7%;
      animation-delay: 1.5s, 0.5s;
    }
    .auth-float-badge-2 {
      bottom: 24%; left: 6%;
      animation-delay: 2s, 1.2s;
    }
    .gsetup-overlay {
      position: fixed; inset: 0; z-index: 1000;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      display: flex; align-items: center; justify-content: center;
      animation: gsFade 0.2s ease both;
    }
    @keyframes gsFade { from { opacity: 0; } to { opacity: 1; } }
    .gsetup-dialog {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px 22px 20px;
      max-width: 380px; width: 90%;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: gsSlide 0.3s var(--bounce) both;
    }
    @keyframes gsSlide {
      from { opacity: 0; transform: translateY(12px) scale(0.96); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .gsetup-dialog h3 { font-size: 0.92rem; font-weight: 600; margin-bottom: 4px; }
    .gsetup-dialog p { font-size: 0.75rem; color: var(--text-tertiary); margin-bottom: 14px; line-height: 1.5; }
    .gsetup-input {
      width: 100%; padding: 10px 13px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      color: var(--text); font-family: inherit; font-size: 0.8rem;
      outline: none; transition: border-color 0.2s; margin-bottom: 10px;
    }
    .gsetup-input:focus { border-color: var(--border-light); }
    .gsetup-actions { display: flex; gap: 6px; justify-content: flex-end; }
    .gsetup-btn {
      padding: 7px 14px; border-radius: 7px;
      border: 1px solid var(--border);
      background: transparent; color: var(--text-secondary);
      font-family: inherit; font-size: 0.75rem; font-weight: 500;
      cursor: pointer; transition: all 0.2s var(--bounce);
    }
    .gsetup-btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }

    /* ─── Responsive ─── */
    @media (max-width: 820px) {
      .auth-grid { grid-template-columns: 1fr; }
      .auth-right { display: none; }
      .auth-left::after { display: none; }
    }
    @media (max-width: 440px) {
      .auth-left { padding: clamp(12px, 3vw, 20px); }
    }
    /* Safety net for very short viewports */
    @media (max-height: 560px) {
      .auth-heading { font-size: 1.1rem; margin-top: 8px; }
      .auth-fields { gap: 4px; margin-top: 8px; }
      .auth-sub { margin-bottom: 2px; }
      .auth-brand { margin-bottom: 4px; }
    }
  </style>
</head>
<body>
  <div class="auth-grid">
    <!-- ═══════════ LEFT: FORM ═══════════ -->
    <div class="auth-left">
      <div class="auth-form-wrap">
        <!-- Brand -->
        <div class="auth-brand">
          <div class="auth-brand-icon">H</div>
          <div class="auth-brand-text">
            <span class="auth-brand-name">Havën</span>
            <span class="auth-brand-tagline">Your schedule, synced</span>
          </div>
        </div>

        <!-- Heading (changes with toggle) -->
        <h1 class="auth-heading" id="authHeading">Welcome <span class="hl-accent">back</span></h1>
        <p class="auth-sub" id="authSub">Enter your name to sign in to your account</p>

        <!-- Form Fields -->
        <div class="auth-fields">
          <div class="auth-input-group">
            <label class="auth-label" for="loginNameInput">Your name</label>
            <input class="auth-input" id="loginNameInput" type="text" placeholder="e.g. Alex" autocomplete="name" spellcheck="false" maxlength="30">
          </div>

          <button class="auth-submit" id="loginNameBtn" disabled>Sign In</button>

          <div class="auth-divider"><span>Or continue with</span></div>

          <!-- Google Sign-In -->
          <div id="googleSection">
            <div id="googleButtonContainer"></div>
            <button class="auth-google-btn" id="loginGoogleBtn" style="display:none">
              <svg viewBox="0 0 48 48" fill="none">
                <path d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z" fill="#FFC107"/>
                <path d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z" fill="#FF3D00"/>
                <path d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0124 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z" fill="#4CAF50"/>
                <path d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 01-4.087 5.571l.003-.002 6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z" fill="#1976D2"/>
              </svg>
              <span>Continue with Google</span>
            </button>
          </div>
        </div>

        <!-- Toggle -->
        <p class="auth-toggle" id="authToggle">
          Don't have an account? <button id="authToggleBtn">Sign up</button>
        </p>
      </div>
    </div>

    <!-- ═══════════ RIGHT: PREVIEW ═══════════ -->
    <div class="auth-right">
          <!-- Carousel Preview -->
      <div class="auth-carousel">
        <div class="auth-carousel-label">
          <span class="auth-carousel-label-name" id="carouselLabel">Schedule</span>
          <span class="auth-carousel-label-index" id="carouselIndex">1 / 6</span>
        </div>
        <div class="auth-carousel-track" id="carouselTrack">

          <!-- Slide 1: Schedule -->
          <div class="auth-carousel-slide active-slide">
            <svg viewBox="0 0 480 340" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect width="480" height="340" rx="14" fill="#0a0a0a"/>
              <rect x="0.5" y="0.5" width="479" height="339" rx="13.5" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

  <script src="https://accounts.google.com/gsi/client" async defer id="gsiScript"></script>

  <script>
    (function() {
      var isSignIn = true;
      var input = document.getElementById('loginNameInput');
      var nameBtn = document.getElementById('loginNameBtn');
      var heading = document.getElementById('authHeading');
      var sub = document.getElementById('authSub');
      var toggleText = document.getElementById('authToggle');

      document.addEventListener('DOMContentLoaded', function() {
        initGSI();

        // ─── Typewriter Effect ───
        var quoteText = "Your schedule awaits. The journey continues.";
        var twEl = document.getElementById('typewriterText');
        var cursorEl = document.getElementById('typewriterCursor');
        var charIndex = 0;

        function typeNextChar() {
          if (charIndex < quoteText.length) {
            twEl.textContent += quoteText[charIndex];
            charIndex++;
            // Speed varies: pause at commas and periods
            var delay = 60;
            var ch = quoteText[charIndex - 1];
            if (ch === '.' || ch === '!' || ch === '?') delay = 600;
            else if (ch === ',' || ch === ';') delay = 300;
            setTimeout(typeNextChar, delay);
          } else {
            cursorEl.classList.add('done');
          }
        }
        // Start typing after a short delay
        setTimeout(typeNextChar, 600);

        // ─── Toggle Sign In / Sign Up ───
        function updateToggle() {
          if (isSignIn) {
            heading.innerHTML = 'Welcome <span class="hl-accent">back</span>';
            sub.textContent = 'Enter your name to sign in to your account';
            nameBtn.textContent = 'Sign In';
            toggleText.innerHTML = "Don't have an account? <button id='authToggleBtn'>Sign up</button>";
          } else {
            heading.innerHTML = 'Create your <span class="hl-accent">profile</span>';
            sub.textContent = 'Enter your name to get started with Havën';
            nameBtn.textContent = 'Sign Up';
            toggleText.innerHTML = "Already have an account? <button id='authToggleBtn'>Sign in</button>";
          }
          // Re-bind toggle button
          document.getElementById('authToggleBtn').addEventListener('click', function() {
            isSignIn = !isSignIn;
            updateToggle();
          });
        }

        // ─── Toggle via event delegation ───
        toggleText.addEventListener('click', function(e) {
          if (e.target.id === 'authToggleBtn') {
            isSignIn = !isSignIn;
            updateToggle();
          }
        });

        // ─── Input handling ───
        function updateBtn() {
          nameBtn.disabled = !input.value.trim();
        }
        updateBtn();
        input.addEventListener('input', updateBtn);

        input.addEventListener('keydown', function(e) {
          if (e.key === 'Enter' && input.value.trim()) goLocal();
        });
        nameBtn.addEventListener('click', goLocal);

        function goLocal() {
          var name = input.value.trim();
          if (!name) return;
          nameBtn.disabled = true;
          nameBtn.textContent = '…';
          createLocalProfile(name);
        }


        // ─── Carousel Auto-Rotate ───
        var track = document.getElementById('carouselTrack');
        var dots = document.querySelectorAll('.auth-carousel-dot');
        var slideCount = 7;
        var currentSlide = 0;
        var autoInterval = null;
        var resetTimer = null;
        var CAROUSEL_INTERVAL = 4000;
        var REAL_SLIDE_COUNT = 6;

        function goToSlide(index, instant) {
          if (index < 0) index = 0;
          if (index >= slideCount) index = 0;

          // Clear any pending clone reset
          if (resetTimer) { clearTimeout(resetTimer); resetTimer = null; }

          currentSlide = index;

          if (instant) {
            track.style.transition = 'none';
            track.style.transform = 'translateX(-' + (index * 100) + '%)';
            track.offsetHeight;
            track.style.transition = '';
          } else {
            track.style.transform = 'translateX(-' + (index * 100) + '%)';
          }

          // Dots: use modulo for the clone
          var dotIndex = index >= REAL_SLIDE_COUNT ? 0 : index;
          dots.forEach(function(d, i) {
            d.classList.toggle('active', i === dotIndex);
          });

          // Update label
          var label = document.getElementById('carouselLabel');
          var idxEl = document.getElementById('carouselIndex');
          var names = ['Schedule', 'Hub', 'Finance', 'Analytics', 'Goals', 'Activities'];
          if (label) label.textContent = names[dotIndex];
          if (idxEl) idxEl.textContent = (dotIndex + 1) + ' / ' + REAL_SLIDE_COUNT;

          // 3D effect
          var allSlides = document.querySelectorAll('.auth-carousel-slide');
          allSlides.forEach(function(s, i) {
            s.classList.toggle('active-slide', i === index);
            s.classList.toggle('inactive-slide', i !== index);
          });

          // If on the clone (last slide), after transition silently jump to real first
          if (index === slideCount - 1) {
            resetTimer = setTimeout(function() {
              resetTimer = null;
              goToSlide(0, true);
            }, 800);
          }
        }

        function nextSlide() { goToSlide(currentSlide + 1); }

        function startAutoRotate() {
          if (autoInterval) clearInterval(autoInterval);
          autoInterval = setInterval(nextSlide, CAROUSEL_INTERVAL);
        }

        // Init
        if (track) {
          // Clone first slide for seamless infinite loop
          var firstSlide = track.querySelector('.auth-carousel-slide');
          var clone = firstSlide.cloneNode(true);
          track.appendChild(clone);

          goToSlide(0);
          startAutoRotate();

          // Dot clicks
          dots.forEach(function(dot) {
            dot.addEventListener('click', function() {
              var idx = parseInt(this.getAttribute('data-index'));
              goToSlide(idx);
              startAutoRotate();
            });
          });

          // Pause on hover
          var carousel = document.querySelector('.auth-carousel');
          if (carousel) {
            carousel.addEventListener('mouseenter', function() {
              if (autoInterval) clearInterval(autoInterval);
              autoInterval = null;
            });
            carousel.addEventListener('mouseleave', function() {
              startAutoRotate();
            });
          }
        }
        // ─── Initialize Google Sign-In ───
        var gsiScript = document.getElementById('gsiScript');
        if (gsiScript) {
          gsiScript.onload = initGoogleSignIn;
        } else {
          var _retry = setInterval(function() {
            if (typeof google !== 'undefined' && google.accounts) {
              clearInterval(_retry);
              initGoogleSignIn();
            }
          }, 200);
          setTimeout(function() { clearInterval(_retry); }, 10000);
        }
      });

      // ─── Google Sign-In ───
      function initGoogleSignIn() {
        var clientId = getGoogleClientId();
        var container = document.getElementById('googleButtonContainer');
        var fallbackBtn = document.getElementById('loginGoogleBtn');
        if (!container) return;

        function tryInit() {
          if (typeof google !== 'undefined' && google.accounts && google.accounts.id) {
            if (clientId) {
              fallbackBtn.style.display = 'none';
              google.accounts.id.initialize({
                client_id: clientId,
                callback: handleGoogleCredentialResponse,
                cancel_on_tap_outside: false,
                auto_select: false
              });
              google.accounts.id.renderButton(container, {
                type: 'standard', shape: 'pill', theme: 'outline',
                text: 'continue_with', size: 'large',
                width: 280, logo_alignment: 'left'
              });
            } else {
              container.innerHTML = '';
              fallbackBtn.style.display = 'flex';
            }
          } else {
            setTimeout(tryInit, 300);
          }
        }
        if (clientId) tryInit();
        else { container.innerHTML = ''; fallbackBtn.style.display = 'flex'; }

        fallbackBtn.addEventListener('click', function(e) {
          e.preventDefault();
          showGoogleSetupDialog();
        });
      }

      window.handleGoogleCredentialResponse = function(response) {
        if (!response || !response.credential) { showToast('Google sign-in failed', 'error'); return; }
        try {
          var b64 = response.credential.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
          var p = JSON.parse(window.atob(b64));
          var name = p.name || '', email = p.email || '', picture = p.picture || '', sub = p.sub || '';
          if (!name && !email) { showToast('Could not retrieve user info from Google', 'error'); return; }
          if (typeof googleSignIn === 'function') googleSignIn({ name: name, email: email, picture: picture, googleId: sub });
          else createLocalProfile(name || email.split('@')[0] || 'Google User');
        } catch(e) { console.error('Google error:', e); showToast('Failed to process Google sign-in', 'error'); }
      };

      var GOOGLE_CLIENT_ID_KEY = 'haven-google-client-id';
      function getGoogleClientId() { try { return localStorage.getItem(GOOGLE_CLIENT_ID_KEY) || ''; } catch(e) { return ''; } }
      function setGoogleClientId(id) { try { localStorage.setItem(GOOGLE_CLIENT_ID_KEY, id); } catch(e) {} }

      function showGoogleSetupDialog() {
        var existing = document.querySelector('.gsetup-overlay');
        if (existing) existing.remove();
        var overlay = document.createElement('div');
        overlay.className = 'gsetup-overlay';
        overlay.innerHTML =
          '<div class="gsetup-dialog">' +
            '<h3>Set up Google Sign-In</h3>' +
            '<p>Enter your Google OAuth Client ID to enable sign-in with Google.</p>' +
            '<input class="gsetup-input" id="gsetupClientId" type="text" placeholder="Paste your Client ID" spellcheck="false" value="' + escapeHtml(getGoogleClientId()) + '">' +
            '<div class="gsetup-actions">' +
              '<button class="gsetup-btn" id="gsetupCancel">Cancel</button>' +
              '<button class="gsetup-btn primary" id="gsetupSave">Save</button>' +
            '</div></div>';
        document.body.appendChild(overlay);
        overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
        document.getElementById('gsetupCancel').addEventListener('click', function() { overlay.remove(); });
        document.getElementById('gsetupSave').addEventListener('click', function() {
          var val = document.getElementById('gsetupClientId').value.trim();
          if (val) { setGoogleClientId(val); overlay.remove(); initGoogleSignIn(); showToast('Google Client ID saved!', 'success', 2000); }
          else overlay.remove();
        });
        setTimeout(function() { var inp = document.getElementById('gsetupClientId'); if (inp) inp.focus(); }, 100);
      }

      function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }
    })();
  </script>
</body>
</html>
