<!DOCTYPE html>
<html>
<head>
  <title>Clear Images - Havën</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #111; color: #eee; }
    .card { background: #1a1a1e; border: 1px solid #333; border-radius: 12px; padding: 32px; max-width: 400px; text-align: center; }
    h1 { margin: 0 0 8px; font-size: 1.2rem; }
    p { color: #999; font-size: 0.85rem; margin: 0 0 20px; }
    button { background: #ef4444; color: #fff; border: none; border-radius: 8px; padding: 10px 24px; font-size: 0.9rem; cursor: pointer; transition: background 0.2s; }
    button:hover { background: #dc2626; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .status { margin-top: 16px; font-size: 0.8rem; }
    .ok { color: #22c55e; }
    .err { color: #ef4444; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Clear Stored Images</h1>
    <p>This will remove all custom images from localStorage and IndexedDB. Default placeholders will be restored.</p>
    <button id="clearBtn">Clear All Images</button>
    <div class="status" id="status"></div>
  </div>
  <script>
    document.getElementById('clearBtn').addEventListener('click', function() {
      var btn = this;
      var status = document.getElementById('status');
      btn.disabled = true;
      status.textContent = 'Clearing...';
      status.className = 'status';

      // Clear localStorage image keys
      var lsCount = 0;
      for (var i = localStorage.length - 1; i >= 0; i--) {
        var key = localStorage.key(i);
        if (key && key.indexOf('haven-image-') === 0) {
          localStorage.removeItem(key);
          lsCount++;
        }
      }

      // Delete IndexedDB databases
      var deleted = 0;
      var dbsToDelete = ['haven-images', 'haven-images-guest'];
      var promises = dbsToDelete.map(function(dbName) {
        return new Promise(function(resolve) {
          var req = indexedDB.deleteDatabase(dbName);
          req.onsuccess = function() { deleted++; resolve(); };
          req.onerror = function() { resolve(); };
          req.onblocked = function() { resolve(); };
        });
      });

      Promise.all(promises).then(function() {
        status.innerHTML = '✅ Cleared <strong>' + lsCount + '</strong> localStorage keys<br>✅ Deleted <strong>' + deleted + '</strong> IndexedDB databases<br><br><span style="color:#999">Now visit the hub page — all images should be blank/placeholder.</span>';
        status.className = 'status ok';
        btn.disabled = false;
      });
    });
  </script>
</body>
</html>
